<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOC SPORTS</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="background"></div>

  <div class="app">
    <div class="hero">
  <img src="SOCsportslogo.png" class="logoImg">

  <div class="heroText">
    <h1>School of Coding & AI</h1>
    <p>Sport Booking Portal</p>
  </div>
</div>
    </header>
    <div class="tagline">
  Play together. Stay active. <strong>Build connections.</strong>
</div>
    <h3 class="sectionTitle">
  Upcoming Games
</h3>

    <main>
      <div id="sports" class="cards"></div>

      <section id="bookingSection" class="hidden panel">
        <button class="backBtn" onclick="goBack()">← Back to sports</button>

        <div class="sessionHeader">
          <h2 id="sessionTitle"></h2>
          <p id="sessionInfo"></p>
        </div>

        <form id="bookingForm" class="bookingForm">
          <h3>Book your place</h3>
          <input id="name" placeholder="Full name" required />
          <input id="email" type="email" placeholder="Email address" required />
          <input id="phone" placeholder="Phone number" required />
          <button type="submit">Confirm Booking</button>
        </form>

        <div class="legend">
          <span><b class="dot green"></b> Confirmed</span>
          <span><b class="dot orange"></b> Waiting list</span>
        </div>

        <h3>Participants</h3>
        <div id="participants"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
